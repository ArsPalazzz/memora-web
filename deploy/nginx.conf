server {
    listen 80;
    server_name app.example.com;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy — same-origin /api for httpOnly refresh cookies
    location /api/ {
        proxy_pass http://memora-api:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Unified PWA + FCM service worker (vite-plugin-pwa injectManifest → /sw.js)
    location = /sw.js {
        add_header Content-Type application/javascript;
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri =404;
    }

    # FCM chunk loaded via importScripts() from sw.js (scripts/generate-sw.js)
    location = /firebase-messaging-sw.js {
        add_header Content-Type application/javascript;
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri =404;
    }

    # Dev-only fallback: standalone FCM SW registration with root scope
    # (not used in prod when sw.js is active; header harmless if kept)
    # add_header Service-Worker-Allowed /;

    location /manifest.json {
        add_header Cache-Control "public, max-age=3600";
    }
}
